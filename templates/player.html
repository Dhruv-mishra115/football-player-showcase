<!DOCTYPE html>
<html>
<head>
    <title>Player Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="form-container">

    <div class="form-box">
        <h2>{{ player[1] }}</h2>

        <p><strong>Age:</strong> {{ player[2] }}</p>
        <p><strong>Position:</strong> {{ player[3] }}</p>
        <p><strong>Contact:</strong> {{ player[4] }}</p>

        {% if player[5] %}
        <a href="{{ player[5] }}" target="_blank" class="hero-btn">
            Watch Video
        </a>
        {% endif %}

    </div>

</div>

</body>
</html>
