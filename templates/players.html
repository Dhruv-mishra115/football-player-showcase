<!DOCTYPE html>
<html>
<head>
    <title>All Players</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="players-container">
    <h2 style="text-align:center; margin-bottom:30px;">All Players</h2>

    <div class="players-grid">

        {% for player in players %}
        <div class="player-card">
            <h3>
                <a href="/player/{{ player[0] }}" style="color:white; text-decoration:none;">
                    {{ player[1] }}
                </a>
            </h3>

            <p><strong>Age:</strong> {{ player[2] }}</p>
            <p><strong>Position:</strong> {{ player[3] }}</p>
            <p><strong>Contact:</strong> {{ player[4] }}</p>

            {% if player[5] %}
            <a href="{{ player[5] }}" target="_blank">Watch Video</a>
            {% endif %}
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
